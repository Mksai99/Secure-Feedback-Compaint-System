{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">
    <div class="card-custom p-4 mt-5">
      <div class="text-center mb-4">
        <i class="bi bi-shield-lock text-primary-custom" style="font-size: 2.5rem;"></i>
        <h3 class="mt-2 text-primary-custom">Welcome Back</h3>
        <p class="text-muted small">Secure, Anonymous, Verified.</p>
      </div>

      {% if error %}
      <div class="alert alert-danger py-2 small">
        <i class="bi bi-exclamation-triangle"></i> {{ error }}
      </div>
      {% endif %}

      <form action="/login" method="post">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-person"></i>
            </span>
            <input type="text" name="username" class="form-control" placeholder="Enter your ID" required />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-lock"></i>
            </span>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required />
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">Select Role</label>
          <select name="role" class="form-select" required>
            <option value="" disabled selected>Choose your role...</option>
            <option value="student">Student</option>
            <option value="faculty">Faculty</option>
            <option value="admin">Admin</option>
            <option value="authority">Authority</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary w-100">
          Sign In <i class="bi bi-arrow-right-circle ms-1"></i>
        </button>
      </form>
    </div>

    <div class="text-center mt-3 text-muted small">
      Protected by Blockchain & Privacy Protocols
    </div>
  </div>
</div>
{% endblock %}
