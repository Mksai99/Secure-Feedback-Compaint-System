{% extends "base.html" %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
  <div class="col-sm-10 col-md-6 col-lg-4" style="max-width: 420px;">
    <div class="glass-panel p-4 rounded-4 shadow-lg">
      <div class="text-center mb-4">
        <div
          class="d-inline-flex align-items-center justify-content-center bg-primary-subtle text-primary rounded-circle mb-3"
          style="width: 64px; height: 64px;">
          <i class="bi bi-shield-lock-fill fs-2"></i>
        </div>
        <h2 class="fw-bold text-primary mb-1">Secure Feedback</h2>
        <p class="text-muted small">Institutional & Anonymous</p>
      </div>

      {% if error %}
      <div class="alert alert-danger fade show mb-4" role="alert">
        <i class="bi bi-exclamation-circle-fill text-danger fs-5"></i>
        <div>{{ error }}</div>
      </div>
      {% endif %}

      <form action="/login" method="post" class="needs-validation">
        <div class="mb-4">
          <label class="form-label text-uppercase small text-muted fw-bold">Identification</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0">
              <i class="bi bi-person text-muted"></i>
            </span>
            <input type="text" name="username" class="form-control border-start-0 ps-0" placeholder="Username or ID"
              required style="background: transparent;">
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label text-uppercase small text-muted fw-bold">Security Credential</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0">
              <i class="bi bi-key text-muted"></i>
            </span>
            <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="••••••••"
              required style="background: transparent;">
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label text-uppercase small text-muted fw-bold">Role Access</label>
          <select name="role" class="form-select" required>
            <option value="" disabled selected>Select your role...</option>
            <option value="student">Student</option>
            <option value="faculty">Faculty</option>
            <option value="admin">Admin</option>
            <option value="authority">Authority (Oversight)</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 shadow-sm">
          Access System <i class="bi bi-arrow-right-short ms-1 fs-5 align-middle"></i>
        </button>
      </form>

      <div class="mt-4 pt-3 border-top text-center">
        <div class="d-flex justify-content-center gap-3 text-muted small">
          <span><i class="bi bi-shield-check me-1"></i>Encoded</span>
          <span><i class="bi bi-incognito me-1"></i>Anonymous</span>
          <span><i class="bi bi-link-45deg me-1"></i>Verified</span>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
