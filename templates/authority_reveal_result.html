{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-md-8 col-lg-6">
        <div class="glass-card p-5 text-center border-danger">
            <div class="mb-4">
                <i class="bi bi-eye-fill display-1 text-danger"></i>
            </div>

            <h2 class="mb-3 text-uppercase text-danger">Identity Revealed</h2>
            <p class="text-secondary mb-4">You have successfully decrypted the identity for feedback ID: <br><code
                    class="text-light">{{ feedback_id }}</code></p>

            <div class="card bg-dark border-secondary mb-4">
                <div class="card-body">
                    <h5 class="card-title text-secondary small text-uppercase">Student Identity (Username)</h5>
                    <h3 class="display-6 text-warning font-monospace">{{ real_identity }}</h3>
                </div>
            </div>

            <div class="alert alert-dark text-start">
                <small class="text-secondary"><i class="bi bi-info-circle"></i> <strong>Audit Record
                        Created:</strong></small>
                <br>
                <small>Reason: "{{ reason }}"</small>
            </div>

            <a href="/authority" class="btn btn-outline-light mt-3">
                <i class="bi bi-arrow-left"></i> Return to Authority Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
